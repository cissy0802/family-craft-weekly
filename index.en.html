<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doing Together</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"Noto Sans SC","Segoe UI",Roboto,sans-serif;background:#fffaf0;color:#3d3328;line-height:1.8}
.container{max-width:720px;margin:0 auto;padding:24px 20px 60px}
header{text-align:center;padding:56px 0 40px}
header h1{font-size:2rem;font-weight:800;color:#e8743b;letter-spacing:2px}
header p{margin-top:8px;font-size:1rem;color:#8a7a66}
.list{margin-top:32px}
.entry{display:flex;align-items:baseline;gap:16px;padding:18px 20px;background:#fff;border-radius:10px;box-shadow:0 1px 8px rgba(0,0,0,0.05);margin-bottom:14px;transition:transform 0.15s,box-shadow 0.15s;text-decoration:none;color:inherit}
.entry:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,0.1)}
.entry .day{flex-shrink:0;font-size:0.85rem;font-weight:700;color:#e8743b;font-variant-numeric:tabular-nums;min-width:56px}
.entry .title{font-size:1.05rem;font-weight:600;color:#3d3328}
.entry .models{font-size:0.88rem;color:#8a7a66;margin-left:auto;text-align:right}
footer{text-align:center;padding:40px 0 12px;font-size:0.82rem;color:#c4b5a0}
@media(max-width:600px){
  header h1{font-size:1.5rem}
  .entry{flex-direction:column;gap:4px}
  .entry .models{margin-left:0;text-align:left}
}
</style>
</head>
<body>
<div class="container">
<header>
  <h1>Doing Together</h1>
  <p>Hands-on family practice, with the kids</p>
</header>
<div class="list">
</div>
<footer>Process over outcome, presence over teaching.</footer>
</div>
</body>
</html>
